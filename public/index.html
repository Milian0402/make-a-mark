<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>make-a-mark</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

  <header class="topbar glass-panel">
    <div>
      <h1>make-a-mark</h1>
      <p class="subtitle">Permanent marks in a codebase, with runnable examples.</p>
    </div>
    <p class="count" id="count">Loading marks...</p>
  </header>

  <section class="controls glass-panel" aria-label="Filter marks">
    <label class="control search-control">
      <span>Search</span>
      <input id="search" type="search" placeholder="Search by mark, description, or flag" autocomplete="off">
    </label>

    <label class="control toggle-control" id="runnable-wrap" hidden>
      <input id="runnable-only" type="checkbox">
      <span>Show runnable only</span>
    </label>
  </section>

  <nav id="tabs" class="tabs" aria-label="Mark categories"></nav>

  <main id="content" aria-live="polite">
    <p class="empty">Loading...</p>
  </main>

  <template id="card-template">
    <article class="mark-card glass-panel">
      <div class="card-head">
        <h2 class="card-title"></h2>
        <div class="card-tags"></div>
      </div>
      <p class="card-description"></p>
      <div class="validation" role="alert" aria-live="polite"></div>
      <form class="args-form" novalidate></form>
      <div class="card-actions">
        <button class="btn" data-action="copy" type="button">Copy command</button>
        <button class="btn" data-action="reset" type="button">Reset</button>
        <button class="btn btn-run" data-action="run" type="button">Run</button>
      </div>
      <details class="output" hidden>
        <summary>
          <span class="output-title">Output</span>
          <span class="output-meta"></span>
        </summary>
        <div class="output-tabs" role="tablist" aria-label="Output streams">
          <button type="button" class="btn-tab" data-stream-tab="stdout" role="tab">stdout</button>
          <button type="button" class="btn-tab" data-stream-tab="stderr" role="tab">stderr</button>
          <button type="button" class="btn-tab" data-stream-tab="history" role="tab">history</button>
          <button type="button" class="btn-copy-output">Copy output</button>
        </div>
        <pre class="output-stream" data-stream="stdout"></pre>
        <pre class="output-stream" data-stream="stderr" hidden></pre>
        <pre class="output-stream" data-stream="history" hidden></pre>
      </details>
    </article>
  </template>

  <script type="module" src="/app.js"></script>
</body>
</html>
